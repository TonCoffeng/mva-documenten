<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MVA Documentbibliotheek</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Roboto', sans-serif; background: #f5f5f5; color: #25346c; }
  header { background: #25346c; padding: 0 32px; height: 64px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
  .logo { color: white; font-size: 20px; font-weight: 700; }
  .logo span { color: #ff6600; }
  .header-sub { color: rgba(255,255,255,0.6); font-size: 13px; }
  .container { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }
  .status-bar { background: white; border-radius: 10px; padding: 14px 20px; margin-bottom: 24px; display: flex; align-items: center; gap: 12px; font-size: 13px; border: 1px solid #e0e0e0; }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .dot-loading { background: #ffa500; animation: pulse 1s infinite; }
  .dot-ok { background: #4caf50; }
  .dot-error { background: #f44336; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .toolbar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
  .search-box { flex: 1; min-width: 200px; padding: 10px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; font-family: 'Roboto', sans-serif; outline: none; }
  .search-box:focus { border-color: #ff6600; }
  .filter-btn { padding: 10px 16px; border: 1px solid #ddd; background: white; border-radius: 8px; font-size: 13px; cursor: pointer; font-family: 'Roboto', sans-serif; color: #25346c; transition: all 0.15s; }
  .filter-btn.active { background: #ff6600; color: white; border-color: #ff6600; }
  .section-title { font-size: 13px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.8px; margin: 24px 0 12px; }
  .doc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
  .doc-card { background: white; border-radius: 10px; padding: 18px 20px; border: 1px solid #e8e8e8; cursor: pointer; transition: all 0.15s; display: flex; flex-direction: column; gap: 8px; }
  .doc-card:hover { border-color: #ff6600; box-shadow: 0 3px 12px rgba(255,102,0,0.12); transform: translateY(-1px); }
  .doc-icon { font-size: 24px; }
  .doc-name { font-size: 14px; font-weight: 500; color: #25346c; line-height: 1.3; }
  .doc-meta { font-size: 12px; color: #999; display: flex; gap: 10px; }
  .doc-tag { font-size: 11px; padding: 2px 8px; border-radius: 20px; background: #f0f4ff; color: #25346c; font-weight: 500; align-self: flex-start; }
  .doc-tag.oranje { background: #fff3ec; color: #ff6600; }
  .breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 13px; margin-bottom: 20px; flex-wrap: wrap; }
  .breadcrumb a { color: #ff6600; cursor: pointer; }
  .breadcrumb a:hover { text-decoration: underline; }
  .empty-state { text-align: center; padding: 60px 20px; color: #aaa; }
  .loading-spinner { display: flex; justify-content: center; padding: 60px; }
  .spinner { width: 36px; height: 36px; border: 3px solid #e0e0e0; border-top-color: #ff6600; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box { background: #fff3ec; border: 1px solid #ffccaa; border-radius: 10px; padding: 20px; color: #c0440a; font-size: 14px; line-height: 1.6; }
  .drive-selector { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
  .drive-btn { padding: 8px 16px; border-radius: 8px; border: 1px solid #ddd; background: white; font-size: 13px; cursor: pointer; font-family: 'Roboto', sans-serif; color: #25346c; transition: all 0.15s; }
  .drive-btn.active { background: #25346c; color: white; border-color: #25346c; }
</style>
</head>
<body>
<header>
  <div class="logo">MvA <span>Documenten</span></div>
  <div class="header-sub">SharePoint Bibliotheek</div>
</header>
<div class="container">
  <div class="status-bar" id="statusBar">
    <div class="status-dot dot-loading" id="statusDot"></div>
    <span id="statusText">Verbinding maken met SharePoint...</span>
  </div>
  <div id="driveSelector" class="drive-selector" style="display:none"></div>
  <div class="toolbar">
    <input class="search-box" id="searchBox" type="text" placeholder="Zoek documenten..." oninput="filterDocs()" />
    <button class="filter-btn active" id="filterAll" onclick="setFilter('all')">Alles</button>
    <button class="filter-btn" id="filterPdf" onclick="setFilter('pdf')">PDF</button>
    <button class="filter-btn" id="filterWord" onclick="setFilter('word')">Word</button>
    <button class="filter-btn" id="filterExcel" onclick="setFilter('excel')">Excel</button>
  </div>
  <div id="breadcrumb" class="breadcrumb" style="display:none"></div>
  <div id="content"><div class="loading-spinner"><div class="spinner"></div></div></div>
</div>
<script>
const API='/.netlify/functions/sharepoint';
let allFiles=[],currentFilter='all',currentDriveId=null,currentPath='',pathHistory=[],allDrives=[],currentSiteId=null;
function fileIcon(n){const e=(n.split('.').pop()||'').toLowerCase();return{pdf:'\u{1F4C4}',docx:'\u{1F4DD}',doc:'\u{1F4DD}',xlsx:'\u{1F4CA}',xls:'\u{1F4CA}',pptx:'\u{1F4CB}',ppt:'\u{1F4CB}'}[e]||'\u{1F4C1}';}
function fileTag(n){const e=(n.split('.').pop()||'').toLowerCase();return{pdf:{label:'PDF',oranje:true},docx:{label:'Word'},doc:{label:'Word'},xlsx:{label:'Excel'},xls:{label:'Excel'},pptx:{label:'PowerPoint'},ppt:{label:'PowerPoint'}}[e]||null;}
function formatSize(b){if(!b)return'';if(b<1024)return b+' B';if(b<1048576)return(b/1024).toFixed(0)+' KB';return(b/1048576).toFixed(1)+' MB';}
function formatDate(d){if(!d)return'';return new Date(d).toLocaleDateString('nl-NL',{day:'numeric',month:'short',year:'numeric'});}
function setStatus(t,txt){document.getElementById('statusDot').className='status-dot '+(t==='ok'?'dot-ok':t==='error'?'dot-error':'dot-loading');document.getElementById('statusText').textContent=txt;}
async function init(){
  try{
    const tr=await fetch(API+'?action=token-check');
    if(!tr.ok)throw new Error('Netlify Function niet bereikbaar ('+tr.status+')');
    setStatus('loading','Token OK — SharePoint sites ophalen...');
    const sr=await fetch(API+'?action=sites');
    const sd=await sr.json();
    if(sd.error)throw new Error('Sites: '+sd.error.message);
    const sites=sd.value||[];
    if(sites.length===0)throw new Error('Geen SharePoint sites gevonden. Beheerderstoestemming nodig.');
    const site=sites.find(s=>s.name&&s.name.toLowerCase().includes('mva'))||sites[0];
    currentSiteId=site.id;
    setStatus('loading','Site: '+( site.displayName||site.name)+' — drives laden...');
    const dr=await fetch(API+'?action=drives&siteId='+encodeURIComponent(currentSiteId));
    const dd=await dr.json();
    if(dd.error)throw new Error('Drives: '+dd.error.message);
    allDrives=dd.value||[];
    if(allDrives.length===0)throw new Error('Geen document libraries gevonden.');
    const div=document.getElementById('driveSelector');
    div.style.display='flex';
    allDrives.forEach((d,i)=>{const b=document.createElement('button');b.className='drive-btn'+(i===0?' active':'');b.textContent='\u{1F4DA} '+d.name;b.onclick=()=>selectDrive(d.id,d.name,b);div.appendChild(b);});
    await selectDrive(allDrives[0].id,allDrives[0].name,div.querySelector('.drive-btn'));
  }catch(e){setStatus('error','Verbindingsfout');document.getElementById('content').innerHTML='<div class="error-box"><strong>SharePoint kon niet worden geladen</strong>'+e.message+'<br><br><small>Controleer: beheerderstoestemming Azure, AZURE_CLIENT_SECRET Netlify, Sites.ReadWrite.All machtiging</small></div>';}
}
async function selectDrive(id,name,btn){currentDriveId=id;currentPath='';pathHistory=[{path:'',label:name}];document.querySelectorAll('.drive-btn').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');await loadFiles('',name);}
async function loadFiles(path){document.getElementById('content').innerHTML='<div class="loading-spinner"><div class="spinner"></div></div>';updateBreadcrumb();
  try{const r=await fetch(API+'?action=files&driveId='+encodeURIComponent(currentDriveId)+'&path='+encodeURIComponent(path));const d=await r.json();if(d.error)throw new Error(d.error.message);allFiles=d.value||[];setStatus('ok',allFiles.filter(i=>!i.folder).length+' documenten geladen uit SharePoint');renderItems(allFiles);}catch(e){setStatus('error','Fout');document.getElementById('content').innerHTML='<div class="error-box"><strong>Fout bij laden</strong>'+e.message+'</div>';}}
function updateBreadcrumb(){const bc=document.getElementById('breadcrumb');if(pathHistory.length<=1){bc.style.display='none';return;}bc.style.display='flex';bc.innerHTML=pathHistory.map((p,i)=>i===pathHistory.length-1?'<span>'+p.label+'</span>':'<a onclick="navigateTo('+i+')">'+p.label+'</a> <span>&#8250;</span>').join('');}
async function navigateTo(i){pathHistory=pathHistory.slice(0,i+1);currentPath=pathHistory[pathHistory.length-1].path;await loadFiles(currentPath);}
async function openFolder(name){const np=currentPath?currentPath+'/'+name:name;pathHistory.push({path:np,label:name});currentPath=np;await loadFiles(np);}
function renderItems(items){
  const q=document.getElementById('searchBox').value.toLowerCase();
  let f=items;
  if(q)f=f.filter(i=>i.name.toLowerCase().includes(q));
  if(currentFilter!=='all'){const m={pdf:['pdf'],word:['docx','doc'],excel:['xlsx','xls']};const ex=m[currentFilter]||[];f=f.filter(i=>i.folder||ex.includes((i.name.split('.').pop()||'').toLowerCase()));}
  const folders=f.filter(i=>i.folder),files=f.filter(i=>!i.folder);
  let h='';
  if(folders.length){h+='<div class="section-title">Mappen ('+folders.length+')</div><div class="doc-grid">';folders.forEach(x=>{h+='<div class="doc-card" onclick="openFolder('+JSON.stringify(x.name).replace(/"/g,\'&quot;\')+')">'+'<div class="doc-icon">\u{1F4C1}</div><div class="doc-name">'+x.name+'</div><div class="doc-meta"><span>'+(x.folder.childCount||0)+' items</span></div></div>';});h+='</div>';}
  if(files.length){h+='<div class="section-title">Documenten ('+files.length+')</div><div class="doc-grid">';files.forEach(x=>{const t=fileTag(x.name);h+='<div class="doc-card" onclick="window.open(\''+( x.webUrl||'#')+'\',\'_blank\')"><div class="doc-icon">'+fileIcon(x.name)+'</div><div class="doc-name">'+x.name+'</div><div class="doc-meta"><span>'+formatSize(x.size)+'</span><span>'+formatDate(x.lastModifiedDateTime)+'</span></div>'+(t?'<div class="doc-tag'+(t.oranje?' oranje':'')+'">'+t.label+'</div>':'')+'</div>';});h+='</div>';}
  if(!folders.length&&!files.length)h='<div class="empty-state"><div class="doc-icon" style="font-size:48px">\u{1F4ED}</div><p>Geen documenten gevonden</p></div>';
  document.getElementById('content').innerHTML=h;
}
function filterDocs(){renderItems(allFiles);}
function setFilter(f){currentFilter=f;['all','pdf','word','excel'].forEach(id=>{const el=document.getElementById('filter'+id.charAt(0).toUpperCase()+id.slice(1));if(el)el.classList.toggle('active',id===f);});renderItems(allFiles);}
init();
</script>
</body>
</html>
